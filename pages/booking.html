<!DOCTYPE html>
<html>
<head>
    <title>Booking - TripVerse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
    <h1 class="logo">TripVerse</h1>
    <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="service.html">Services</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- BOOKING SECTION -->
<section class="booking-section" id="booking">

    <div class="booking-container">
        <h2>Book Your Journey</h2>
        <p class="booking-subtitle">Find the best travel options across India</p>

        <form class="booking-form">

            <div class="input-group">
                <label>From</label>
                <input type="text" placeholder="Enter departure city">
            </div>

            <div class="input-group">
                <label>To</label>
                <input type="text" placeholder="Enter destination city">
            </div>

            <div class="input-group">
                <label>Date</label>
                <input type="date">
            </div>

            <div class="input-group">
                <label>Transport</label>
                <select>
                    <option>Flight</option>
                    <option>Train</option>
                    <option>Bus</option>
                    <option>Cab</option>
                </select>
            </div>

            <button type="submit" class="search-btn">Search Now</button>

        </form>
    </div>

</section>

</body>
</html>
