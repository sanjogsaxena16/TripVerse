<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Planner - TripVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
<nav class="navbar">
    <a href="../index.html" class="logo">TripVerse</a>
    <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="booking.html">Book</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="service.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html" class="register-btn">Register</a></li>
    </ul>
</nav>
<section class="page-header">
    <h2>Trip Planner</h2>
</section>
<section class="planner-section" style="padding: 60px; display: flex; justify-content: center;">
    <div class="planner-form auth-container" style="background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left; max-width: 500px; padding: 40px;">
        <h3 style="color: var(--primary); margin-bottom: 20px; font-size: 24px;">Start Planning</h3>
        <form>
            <div class="input-group" style="margin-bottom: 20px;">
                <label>Trip Name</label>
                <input type="text" placeholder="E.g., Summer Vacation 2026">
            </div>
            <div class="input-group" style="margin-bottom: 20px;">
                <label>Destination</label>
                <input type="text" placeholder="Where do you want to go?">
            </div>
            <button class="search-btn" style="width: 100%;">Create Plan</button>
        </form>
    </div>
</section>
</body>
</html>
